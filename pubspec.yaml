name: shift_app
description: "SHIFT Performance Tracking App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_reactive_ble: ^5.4.0
  permission_handler: ^11.3.0

  # AI
  google_generative_ai: ^0.4.0

  # Utilities
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

# 🔥 CRITICAL FIX FOR ANDROID BLE CRASH
# Prevents protobuf v3 conflict that breaks flutter_reactive_ble
dependency_overrides:
  protobuf: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
