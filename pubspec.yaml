name: shift_app
description: "SHIFT Performance Tracking App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_reactive_ble: ^5.4.0
  permission_handler: ^11.3.0

  # AI
  google_generative_ai: ^0.4.0

  # Utilities
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dependency_overrides:
  protobuf: ^2.1.0
  # 🔥 PERMANENT FIX FOR ANDROID BLE CRASH
  # Vendored local copy of reactive_ble_mobile with depth guard patch applied
  # to ProtobufMessageConverter.kt to prevent infinite recursion on Android GATT
  # discovery. This means the fix is automatic for everyone who clones the repo.
  reactive_ble_platform_interface: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
